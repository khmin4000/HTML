<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장 신뢰 게임 - 수업용</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&display=swap');
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="ready-stage" class="bg-white p-16 rounded-[4rem] shadow-2xl max-w-2xl w-full text-center border-8 border-indigo-100">
        <h1 class="title-font text-6xl text-indigo-900 mb-6">🎖️ 신뢰의 게임</h1>
        <div class="bg-indigo-50 p-6 rounded-3xl mb-10 text-left text-xl space-y-2 text-indigo-900 font-bold">
            <p>🤝 둘 다 협력 : 도장 1개씩</p>
            <p>😈 나만 배신 : 나 도장 2개 (상대 0개)</p>
            <p>🤷 둘 다 배신 : 도장 0개</p>
        </div>
        <button onclick="goDiscussion()" class="w-full py-10 bg-indigo-600 text-white rounded-3xl title-font text-5xl shadow-2xl hover:bg-indigo-700 transition transform hover:scale-105 active:scale-95">
            <i class="fas fa-play mr-4"></i> 게임 시작!
        </button>
    </div>

    <div id="discussion-stage" class="hidden text-center">
        <div id="timer-display" class="title-font text-[14rem] leading-none text-indigo-600 mb-8">60</div>
        <h2 id="status-msg" class="text-4xl font-black mb-6 text-slate-800">💬 대화 준비 단계</h2>
        <p class="text-2xl text-slate-500 mb-10">선생님의 타이머 시작 버튼을 기다려주세요!</p>
        
        <div class="flex gap-4 justify-center">
            <button id="timer-start-btn" onclick="runTimer()" class="px-12 py-6 bg-rose-500 text-white rounded-2xl title-font text-3xl shadow-xl hover:bg-rose-600 transition transform hover:scale-105">
                <i class="fas fa-stopwatch mr-3"></i> 타이머 작동!
            </button>
            
            <button onclick="startSelection()" class="px-12 py-6 bg-slate-600 text-white rounded-2xl title-font text-3xl shadow-xl hover:bg-slate-700 transition transform hover:scale-105">
                바로 선택하기
            </button>
        </div>
    </div>

    <div id="selection-stage" class="hidden flex flex-col items-center gap-10 w-full max-w-6xl">
        <div class="flex gap-10 w-full">
            <div class="flex-1 bg-white p-12 rounded-[3rem] shadow-xl border-4 border-slate-100 flex flex-col items-center">
                <h2 class="title-font text-4xl mb-12 text-indigo-900">학생 1</h2>
                <div id="p1-controls" class="flex flex-col gap-6 w-full">
                    <button onclick="makeChoice(1, 'cooperate')" class="py-10 bg-emerald-500 text-white rounded-3xl title-font text-4xl hover:bg-emerald-600 transition flex items-center justify-center gap-4">
                        <i class="fas fa-handshake"></i> 협력
                    </button>
                    <button onclick="makeChoice(1, 'betray')" class="py-10 bg-rose-500 text-white rounded-3xl title-font text-4xl hover:bg-rose-600 transition flex items-center justify-center gap-4">
                        <i class="fas fa-user-secret"></i> 배신
                    </button>
                </div>
                <div id="p1-ready" class="hidden text-emerald-500 flex flex-col items-center gap-6 py-10">
                    <i class="fas fa-check-circle text-[10rem]"></i>
                    <span class="text-3xl font-black text-slate-700">준비 완료</span>
                </div>
            </div>

            <div class="flex-1 bg-white p-12 rounded-[3rem] shadow-xl border-4 border-slate-100 flex flex-col items-center">
                <h2 class="title-font text-4xl mb-12 text-indigo-900">학생 2</h2>
                <div id="p2-controls" class="flex flex-col gap-6 w-full">
                    <button onclick="makeChoice(2, 'cooperate')" class="py-10 bg-emerald-500 text-white rounded-3xl title-font text-4xl hover:bg-emerald-600 transition flex items-center justify-center gap-4">
                        <i class="fas fa-handshake"></i> 협력
                    </button>
                    <button onclick="makeChoice(2, 'betray')" class="py-10 bg-rose-500 text-white rounded-3xl title-font text-4xl hover:bg-rose-600 transition flex items-center justify-center gap-4">
                        <i class="fas fa-user-secret"></i> 배신
                    </button>
                </div>
                <div id="p2-ready" class="hidden text-emerald-500 flex flex-col items-center gap-6 py-10">
                    <i class="fas fa-check-circle text-[10rem]"></i>
                    <span class="text-3xl font-black text-slate-700">준비 완료</span>
                </div>
            </div>
        </div>
        <button id="result-btn" onclick="showResult()" class="hidden px-20 py-8 bg-amber-500 text-white rounded-full title-font text-5xl shadow-2xl hover:bg-amber-600 transition animate-bounce">
            결과 확인!
        </button>
    </div>

    <div id="result-stage" class="hidden bg-white p-16 rounded-[4rem] shadow-2xl max-w-5xl w-full text-center border-[12px] border-indigo-50">
        <h2 class="title-font text-6xl text-indigo-900 mb-12">선택 결과</h2>
        <div class="flex justify-around items-center mb-16">
            <div>
                <p class="text-3xl font-bold text-slate-400 mb-4">학생 1</p>
                <p id="p1-final" class="title-font text-6xl"></p>
            </div>
            <div class="text-7xl text-slate-100 font-thin italic">VS</div>
            <div>
                <p class="text-3xl font-bold text-slate-400 mb-4">학생 2</p>
                <p id="p2-final" class="title-font text-6xl"></p>
            </div>
        </div>
        <div class="bg-indigo-50 p-10 rounded-[2.5rem] mb-12 border-2 border-indigo-100">
            <p class="text-4xl font-black text-slate-700 mb-4">도장 결과</p>
            <p id="reward-msg" class="text-3xl font-bold text-indigo-600"></p>
        </div>
        <button onclick="resetGame()" class="w-full py-8 bg-slate-900 text-white rounded-3xl title-font text-3xl hover:bg-slate-800 transition">
            <i class="fas fa-sync-alt mr-3"></i> 처음으로 돌아가기
        </button>
    </div>

    <script>
        let p1Choice = null;
        let p2Choice = null;
        let timeLeft = 60;
        let timerInterval = null;

        function goDiscussion() {
            document.getElementById('ready-stage').classList.add('hidden');
            document.getElementById('discussion-stage').classList.remove('hidden');
            document.getElementById('timer-display').innerText = 60;
            document.getElementById('status-msg').innerText = "💬 대화 준비 단계";
            document.getElementById('timer-start-btn').classList.remove('hidden');
        }

        function runTimer() {
            document.getElementById('status-msg').innerText = "💬 전략 대화 중!";
            document.getElementById('timer-start-btn').classList.add('hidden');
            document.getElementById('timer-display').classList.add('animate-pulse');
            
            timeLeft = 60;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft;
                if (timeLeft <= 0) {
                    startSelection();
                }
            }, 1000);
        }

        function startSelection() {
            clearInterval(timerInterval);
            document.getElementById('discussion-stage').classList.add('hidden');
            document.getElementById('selection-stage').classList.remove('hidden');
            document.getElementById('timer-display').classList.remove('animate-pulse');
        }

        function makeChoice(player, choice) {
            if (player === 1) {
                p1Choice = choice;
                document.getElementById('p1-controls').classList.add('hidden');
                document.getElementById('p1-ready').classList.remove('hidden');
            } else {
                p2Choice = choice;
                document.getElementById('p2-controls').classList.add('hidden');
                document.getElementById('p2-ready').classList.remove('hidden');
            }
            if (p1Choice && p2Choice) {
                document.getElementById('result-btn').classList.remove('hidden');
            }
        }

        function showResult() {
            document.getElementById('selection-stage').classList.add('hidden');
            document.getElementById('result-stage').classList.remove('hidden');

            const p1Final = document.getElementById('p1-final');
            const p2Final = document.getElementById('p2-final');
            
            p1Final.innerText = p1Choice === 'cooperate' ? '협력 🤝' : '배신 😈';
            p1Final.className = `title-font text-6xl ${p1Choice === 'cooperate' ? 'text-emerald-500' : 'text-rose-500'}`;
            
            p2Final.innerText = p2Choice === 'cooperate' ? '협력 🤝' : '배신 😈';
            p2Final.className = `title-font text-6xl ${p2Choice === 'cooperate' ? 'text-emerald-500' : 'text-rose-500'}`;

            let msg = "";
            if (p1Choice === 'cooperate' && p2Choice === 'cooperate') {
                msg = "🎉 사이좋게 도장을 1개씩 받아요!";
            } else if (p1Choice === 'cooperate' && p2Choice === 'betray') {
                msg = "😈 배신한 학생2만 도장을 2개 받아요!";
            } else if (p1Choice === 'betray' && p2Choice === 'cooperate') {
                msg = "😈 배신한 학생1만 도장을 2개 받아요!";
            } else {
                msg = "🤷 둘 다 도장을 받지 못했어요.";
            }
            document.getElementById('reward-msg').innerText = msg;
        }

        function resetGame() {
            p1Choice = null;
            p2Choice = null;
            clearInterval(timerInterval);
            document.getElementById('result-stage').classList.add('hidden');
            document.getElementById('ready-stage').classList.remove('hidden');
            document.getElementById('p1-controls').classList.remove('hidden');
            document.getElementById('p1-ready').classList.add('hidden');
            document.getElementById('p2-controls').classList.remove('hidden');
            document.getElementById('p2-ready').classList.add('hidden');
            document.getElementById('result-btn').classList.add('hidden');
            document.getElementById('timer-display').classList.remove('animate-pulse');
        }
    </script>
</body>
</html>
